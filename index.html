<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viva Engage — Live Social Wall</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0118;color:#fff}

.bg-gradient{position:fixed;inset:0;background:linear-gradient(45deg,#0a0118,#1a0b2e,#2d1b69,#5b21b6,#7c3aed,#a855f7);background-size:400% 400%;animation:gradientShift 20s ease infinite;z-index:0}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

#particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.6),rgba(167,127,216,.3),transparent);animation:particleFloat linear infinite;filter:blur(2px)}
@keyframes particleFloat{0%{transform:translateY(0) translateX(0) scale(1);opacity:.4}50%{opacity:.7}100%{transform:translateY(-130vh) translateX(50px) scale(.3);opacity:0}}

#setup{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(80px)}
#setup.hidden{display:none}
.setup-box{background:rgba(20,15,40,.95);backdrop-filter:blur(60px) saturate(200%);border:2px solid rgba(167,127,216,.3);border-radius:24px;padding:64px 72px;max-width:800px;width:94%;text-align:center;box-shadow:0 20px 60px rgba(139,92,246,.4),inset 0 1px 0 rgba(255,255,255,.1);animation:popIn .8s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(60px)}to{opacity:1;transform:scale(1) translateY(0)}}
.setup-box h1{font-size:64px;font-weight:900;margin-bottom:16px;background:linear-gradient(135deg,#a855f7,#ec4899,#06b6d4,#f59e0b,#a855f7);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rainbowShift 3s linear infinite;letter-spacing:-2px}
@keyframes rainbowShift{to{background-position:200% center}}
.setup-box p{color:rgba(255,255,255,.9);margin-bottom:56px;font-size:22px;font-weight:500}

.source-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.source-btn{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(236,72,153,.15));backdrop-filter:blur(30px);border:2px solid rgba(167,127,216,.4);border-radius:20px;padding:48px 28px;cursor:pointer;transition:all .4s cubic-bezier(.34,1.56,.64,1);color:#fff;font-size:20px;font-weight:700;position:relative;overflow:hidden}
.source-btn::before{content:'';position:absolute;inset:-100%;background:linear-gradient(135deg,transparent,rgba(255,255,255,.2),transparent);transform:translateX(-100%);transition:transform .6s}
.source-btn:hover::before{transform:translateX(100%)}
.source-btn:hover{background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(236,72,153,.25));border-color:rgba(167,127,216,.8);transform:translateY(-8px) scale(1.05);box-shadow:0 20px 40px rgba(139,92,246,.5)}
.source-btn .icon{font-size:56px;display:block;margin-bottom:20px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.source-btn .btn-title{font-size:20px;font-weight:700;display:block;margin-bottom:8px}
.source-btn .desc{font-size:15px;font-weight:500;color:rgba(255,255,255,.8);display:block}

#communityPicker,#campaignInput{display:none;margin-top:40px;text-align:left}
#communityPicker.show,#campaignInput.show{display:block;animation:slideUp .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

.input-group input{width:100%;padding:20px 24px;border-radius:16px;border:2px solid rgba(167,127,216,.4);background:rgba(20,15,40,.8);backdrop-filter:blur(20px);color:#fff;font-size:18px;font-weight:600;outline:none;transition:all .3s;font-family:inherit}
.input-group input:focus{border-color:#a855f7;background:rgba(20,15,40,.95);box-shadow:0 0 0 4px rgba(168,85,247,.2)}
.input-group input::placeholder{color:rgba(255,255,255,.5)}

.community-list{max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;margin-top:20px;padding-right:8px}
.community-list::-webkit-scrollbar{width:8px}
.community-list::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:4px}
.community-list::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#a855f7,#ec4899);border-radius:4px}
.comm-item{padding:20px 26px;border-radius:16px;cursor:pointer;background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(236,72,153,.1));border:2px solid rgba(167,127,216,.3);transition:all .3s cubic-bezier(.34,1.56,.64,1);font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:16px}
.comm-item:hover{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.2));border-color:#a855f7;transform:translateX(12px) scale(1.03);box-shadow:0 8px 24px rgba(139,92,246,.4)}
.comm-item span:first-child{font-size:28px}

.go-btn{margin-top:20px;width:100%;padding:20px 36px;border-radius:16px;border:none;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;font-weight:900;font-size:20px;cursor:pointer;transition:all .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(139,92,246,.5);font-family:inherit}
.go-btn:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 32px rgba(139,92,246,.7)}

#app{display:none;height:100vh;flex-direction:column;position:relative;z-index:2}
#app.active{display:flex}

.header{display:flex;align-items:center;justify-content:space-between;padding:24px 48px;background:rgba(20,15,40,.95);backdrop-filter:blur(40px) saturate(200%);border-bottom:2px solid rgba(167,127,216,.3);z-index:10;flex-shrink:0;box-shadow:0 4px 24px rgba(139,92,246,.2)}
.logo{font-size:36px;font-weight:900;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.source-badge{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.2));backdrop-filter:blur(20px);border:2px solid rgba(167,127,216,.4);border-radius:24px;padding:10px 24px;font-size:16px;font-weight:800;display:inline-flex;align-items:center;gap:10px;max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats{display:flex;gap:20px}
.stat-pill{background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(236,72,153,.15));backdrop-filter:blur(20px);border:2px solid rgba(167,127,216,.3);border-radius:24px;padding:10px 22px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.stat-pill .num{color:#a855f7;font-weight:900;font-size:22px}
.header-controls{display:flex;gap:16px}
.ctrl-btn{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.2));backdrop-filter:blur(20px);border:2px solid rgba(167,127,216,.3);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;font-size:24px;color:#fff}
.ctrl-btn:hover{background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(236,72,153,.3));transform:scale(1.15);box-shadow:0 8px 24px rgba(139,92,246,.4)}

.grid-wrap{flex:1;overflow:hidden;padding:40px 48px;position:relative;z-index:5}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:32px;padding-bottom:40px;align-content:start;height:100%;overflow-y:auto;scrollbar-width:none;scroll-behavior:smooth}.card-grid::-webkit-scrollbar{display:none}
.card-grid::-webkit-scrollbar{width:10px}
.card-grid::-webkit-scrollbar-track{background:transparent}
.card-grid::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#8b5cf6,#ec4899);border-radius:5px}

.post-card{
  background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(255,255,255,.95));
  backdrop-filter:blur(30px) saturate(200%);
  border-radius:24px;
  padding:32px;
  color:#1a1a1a;
  transition:all .3s;
  position:relative;
  overflow:visible;
  border:2px solid rgba(167,127,216,.2);
  box-shadow:0 12px 40px rgba(139,92,246,.25);
  min-height:280px;
  display:flex;
  flex-direction:column;
}
.post-card.entering{
  animation:waterfallDrop .8s cubic-bezier(.34,1.56,.64,1) forwards;
}
.post-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 24px 60px rgba(139,92,246,.35)}
@keyframes waterfallDrop{from{opacity:0;transform:translateY(60px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.post-card.removing{animation:cardFlyOut .6s ease forwards}
@keyframes cardFlyOut{to{opacity:0;transform:scale(.85) translateY(-80px)}}

.card-header{display:flex;align-items:center;gap:18px;margin-bottom:18px;flex-shrink:0}
.avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:#fff;flex-shrink:0;box-shadow:0 6px 16px rgba(0,0,0,.2);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.author-info{min-width:0;flex:1}
.author-name{font-weight:800;font-size:19px;color:#1a1a1a;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.author-title{font-size:14px;color:#6b7280;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-body{
  margin-bottom:16px;
  flex:0 0 auto;
}
.card-body-text{
  font-size:16px;
  line-height:1.65;
  color:#374151;
  word-break:break-word;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:4;
  overflow:hidden;
}
.card-meta{display:flex;align-items:center;gap:20px;font-size:15px;color:#6b7280;font-weight:700;flex-wrap:wrap;flex-shrink:0}
.card-meta span{display:flex;align-items:center;gap:7px;padding:6px 14px;background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(236,72,153,.08));border-radius:10px}

.status-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;background:rgba(20,15,40,.95);backdrop-filter:blur(40px) saturate(200%);border-top:2px solid rgba(167,127,216,.3);z-index:10;flex-shrink:0;font-size:16px;color:rgba(255,255,255,.9);font-weight:700}
.live-indicator{display:flex;align-items:center;gap:12px}
.live-dot{width:14px;height:14px;border-radius:50%;background:#10b981;animation:livePulse 2s infinite;box-shadow:0 0 16px rgba(16,185,129,.8)}
.live-dot.paused{background:#f59e0b;animation:none}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.shortcuts{display:flex;gap:20px}
.shortcuts kbd{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.2));border:2px solid rgba(167,127,216,.3);border-radius:8px;padding:6px 12px;font-size:13px;font-family:'Segoe UI',sans-serif;font-weight:700}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div id="particles"></div>

<div id="setup">
  <div class="setup-box">
    <h1>ENGAGE FALL</h1>
    <p>🌊 Live social stream</p>
    <div class="source-grid">
      <div class="source-btn" onclick="pickSource('campaign')">
        <span class="icon">✨</span>
        <div class="btn-title">Campaign</div>
        <div class="desc">Stream posts from any hashtag</div>
      </div>
      <div class="source-btn" onclick="pickSource('community')">
        <span class="icon">🚀</span>
        <div class="btn-title">Community</div>
        <div class="desc">Show community energy</div>
      </div>
    </div>
    <div id="campaignInput">
      <div class="input-group"><input type="text" id="campaignQuery" placeholder="Enter campaign hashtag" onkeypress="if(event.key==='Enter')launchCampaign()"></div>
      <button class="go-btn" onclick="launchCampaign()">LET'S GO 🎉</button>
    </div>
    <div id="communityPicker">
      <div class="input-group"><input type="text" id="commSearch" placeholder="Search..." oninput="filterCommunities()"></div>
      <div class="community-list" id="commList"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:28px;min-width:0;flex:1">
      <div class="logo">ENGAGE FALL</div>
      <div class="source-badge" id="sourceBadge">🌊 Live</div>
    </div>
    <div class="stats">
      <div class="stat-pill">📝 <span class="num" id="statPosts">0</span></div>
      <div class="stat-pill">❤️ <span class="num" id="statReactions">0</span></div>
      <div class="stat-pill">💬 <span class="num" id="statComments">0</span></div>
    </div>
    <div class="header-controls">
      <div class="ctrl-btn" id="btnPause" onclick="togglePause()">⏸</div>
      <div class="ctrl-btn" onclick="clearCards()">🗑</div>
      <div class="ctrl-btn" onclick="restartFeed()">🔄</div>
      <div class="ctrl-btn" onclick="toggleFullscreen()">⛶</div>
    </div>
  </div>
  <div class="grid-wrap"><div class="card-grid" id="cardGrid"></div></div>
  <div class="status-bar">
    <div class="live-indicator"><span class="live-dot" id="liveDot"></span><span id="statusText">Live — streaming posts</span></div>
    <div class="shortcuts">
      <span><kbd>Space</kbd> Pause</span><span><kbd>C</kbd> Clear</span><span><kbd>R</kbd> Restart</span><span><kbd>F</kbd> Fullscreen</span>
    </div>
  </div>
</div>

<script>
const CONFIG={MAX_CARDS:12,CARD_INTERVAL:3500,INITIAL_BURST:3,BURST_DELAY:600};
let state={currentSource:'DEMO',sourceData:[],queue:[],paused:false,feedInterval:null,totalPosts:0,totalReactions:0,totalComments:0};

const DATA={
  DEMO:[
    {author:"Alex Chen",title:"Product Manager",body:"Excited to share our Q2 roadmap! We're focusing on three key areas: improving user experience, scaling our infrastructure, and building better collaboration tools. Looking forward to your feedback!",time:"2026-03-03T16:17:56Z",reactions:42,comments:15},
    {author:"Jordan Smith",title:"Engineering Lead",body:"Our team hackathon was a huge success! We built 12 prototypes in 48 hours. The energy and creativity in the room was incredible. Can't wait for the next one!",time:"2026-03-02T18:56:17Z",reactions:56,comments:18},
    {author:"Sam Taylor",title:"Designer",body:"Just finished redesigning our mobile app interface. The new version focuses on simplicity and accessibility. Beta testing starts next week - sign up if you want early access!",time:"2026-03-01T14:27:27Z",reactions:48,comments:14},
    {author:"Morgan Lee",title:"Community Manager",body:"Welcome to all our new community members! This month we're hosting virtual coffee chats every Friday. It's a great way to meet the team and ask questions in a casual setting.",time:"2026-02-28T10:10:59Z",reactions:71,comments:22},
    {author:"Casey Rivera",title:"Developer",body:"Pro tip: Always test your code in multiple browsers before deploying. Learned this the hard way today! Sharing a quick guide on cross-browser testing best practices.",time:"2026-02-27T15:13:55Z",reactions:34,comments:11},

    {author:"Quinn Anderson",title:"Product Designer",body:"Design thinking workshop recap: We explored user journey mapping and rapid prototyping. The insights were fascinating! Planning a follow-up session next month.",time:"2026-02-24T13:38:00Z",reactions:38,comments:12},
    {author:"Dakota Brown",title:"Software Engineer",body:"Open source contribution day was amazing! Our team contributed to 5 different projects. It's rewarding to give back to the community that helps us build better software.",time:"2026-02-23T08:10:29Z",reactions:52,comments:17},
    {author:"Avery Martinez",title:"UX Researcher",body:"User research findings from last month are in! The top request is dark mode (finally implementing it!). Also learned users want better search functionality. Priorities set!",time:"2026-02-22T16:04:30Z",reactions:29,comments:8},
    {author:"Skyler Davis",title:"QA Engineer",body:"Testing week update: Found and fixed 47 bugs across web and mobile. Big shoutout to the engineering team for the quick turnaround. Quality is looking great!",time:"2026-02-21T12:34:11Z",reactions:36,comments:10},
    {author:"Parker Johnson",title:"Content Lead",body:"New content calendar is live! We're publishing tutorials every Monday, case studies on Wednesdays, and community spotlights on Fridays. Stay tuned for great content!",time:"2026-02-20T14:49:55Z",reactions:44,comments:13},
    {author:"Reese Thompson",title:"Backend Developer",body:"API v2 is now in beta! We've improved response times by 40% and added better error handling. Documentation is available for early adopters.",time:"2026-02-19T11:24:24Z",reactions:24,comments:7},
    {author:"Cameron White",title:"Project Manager",body:"Sprint planning for next quarter: We're tackling performance optimization, accessibility improvements, and mobile responsiveness. Excited about what's coming!",time:"2026-02-18T09:33:07Z",reactions:39,comments:11},
    {author:"Drew Garcia",title:"Full Stack Developer",body:"Just deployed a major update! New features include real-time notifications, improved search, and better mobile support. Check it out and let us know what you think!",time:"2026-02-17T07:18:11Z",reactions:27,comments:6},
    {author:"Harper Rodriguez",title:"Technical Writer",body:"Documentation overhaul is complete! Everything is now searchable, categorized, and includes code examples. Making it easier for everyone to build great things.",time:"2026-02-16T15:12:50Z",reactions:35,comments:9},
    {author:"Sage Miller",title:"Security Engineer",body:"Security audit results: All systems passed! We've implemented 2FA, encrypted data at rest, and improved our incident response process. Your data is safe with us.",time:"2026-02-15T13:33:50Z",reactions:43,comments:12},
    {author:"River Thomas",title:"Marketing Manager",body:"Campaign results are in! Our latest initiative reached 100K people and generated incredible engagement. Here's what worked and what we're doing next.",time:"2026-02-14T10:18:02Z",reactions:41,comments:14},
    {author:"Phoenix Clark",title:"Solutions Architect",body:"Architecture review: We're migrating to a microservices model for better scalability. This will improve performance and make deployments faster. Exciting times ahead!",time:"2026-02-13T08:05:17Z",reactions:33,comments:10},
    {author:"Kai Walker",title:"Support Lead",body:"Customer satisfaction scores hit an all-time high this month! Thank you to our amazing support team for going above and beyond. You make the difference!",time:"2026-02-12T14:53:12Z",reactions:26,comments:5}
  ]
};

const COMMUNITIES=[
  {name:"Engage Insiders",id:"1319086"},
  {name:"Engage Engineering 🔧",id:"976603"},
  {name:"Viva Engage Customer Connection",id:"8871437"},
  {name:"AI Productivity in Viva Engage",id:"222466646016"},
  {name:"Engage MCP Playground",id:"250338467840"},
  {name:"Engage Product Talk and Ideas",id:"42382852096"},
  {name:"AI Agents in Viva Engage",id:"201630679040"},
  {name:"Microsoft 365 on Viva Engage",id:"124460"}
];

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[r[i],r[j]]=[r[j],r[i]]}return r}
function clean(t){return t?t.replace(/https?:\/\/\S+/gi,'').replace(/\s{2,}/g,' ').trim():''}
function timeAgo(iso){const d=Date.now()-new Date(iso).getTime(),m=d/6e4;if(m<1)return'now';if(m<60)return Math.floor(m)+'m';const h=m/60;if(h<24)return Math.floor(h)+'h';const days=h/24;return days<30?Math.floor(days)+'d':Math.floor(days/30)+'mo'}
function hash(n){let h=0;for(let i=0;i<n.length;i++)h=((h<<5)-h+n.charCodeAt(i))|0;return Math.abs(h)}
const GRADIENTS=['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#fccb90,#d57eeb)','linear-gradient(135deg,#e0c3fc,#8ec5fc)'];
function avatarGrad(n){return GRADIENTS[hash(n)%GRADIENTS.length]}
function initials(n){const p=n.split(' ');return(p[0]?.[0]||'')+(p[p.length-1]?.[0]||'')}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

(function(){const c=document.getElementById('particles');for(let i=0;i<50;i++){const p=document.createElement('div');p.className='particle';const s=4+Math.random()*7;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${100+Math.random()*30}%;animation-duration:${12+Math.random()*20}s;animation-delay:${-Math.random()*30}s`;c.appendChild(p)}})();

function pickSource(src){
  document.getElementById('communityPicker').classList.remove('show');
  document.getElementById('campaignInput').classList.remove('show');
  if(src==='community'){
    document.getElementById('communityPicker').classList.add('show');
    renderCommunities('');
  }else{
    document.getElementById('campaignInput').classList.add('show');
    document.getElementById('campaignQuery').focus();
  }
}

function renderCommunities(filter){
  const q=filter.toLowerCase();
  const l=document.getElementById('commList');
  l.innerHTML='';
  COMMUNITIES.filter(c=>!q||c.name.toLowerCase().includes(q)).forEach(c=>{
    const d=document.createElement('div');
    d.className='comm-item';
    d.innerHTML=`<span>👥</span><span>${esc(c.name)}</span>`;
    d.onclick=()=>launchCommunity(c);
    l.appendChild(d);
  });
}

function filterCommunities(){renderCommunities(document.getElementById('commSearch').value)}

async function launchCampaign(){
  const q=document.getElementById('campaignQuery').value.trim();
  if(!q)return;

  const btn=document.querySelector('#campaignInput .go-btn');
  const originalText=btn.textContent;

  // Disable button and show loading
  btn.disabled=true;
  btn.textContent='LOADING...';
  btn.style.opacity='0.6';
  btn.style.cursor='wait';

  const campaign=q.replace(/^#/,'').toUpperCase();
  state.currentSource=campaign;

  try{
    const response=await fetch(`/api/search?q=${encodeURIComponent(campaign)}`);
    if(!response.ok)throw new Error('Search failed');
    const data=await response.json();

    if(data.posts && data.posts.length>0){
      state.sourceData=[...data.posts];
      console.log(`✅ Loaded ${data.posts.length} real posts for #${campaign}`);
    }else{
      console.warn(`No posts found for #${campaign}, using demo data`);
      state.sourceData=[...DATA.DEMO];
    }
  }catch(err){
    console.warn(`Could not connect to Engage API: ${err.message}`);
    console.log('Using demo data. Connect to your Engage network for real posts.');
    state.sourceData=[...DATA.DEMO];
  }

  startFeed(`✨ #${campaign}`);
}

function launchCommunity(c){
  state.currentSource='community';
  state.sourceData=[...DATA.DEMO];
  startFeed(`🚀 ${c.name}`);
}

function startFeed(label){
  try{
    document.getElementById('sourceBadge').textContent=label;
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('app').classList.add('active');
    state.totalPosts=0;state.totalReactions=0;state.totalComments=0;
    document.getElementById('cardGrid').innerHTML='';
    updateStats();
    refillQueue();
    state.paused=false;
    document.getElementById('liveDot').classList.remove('paused');
    document.getElementById('btnPause').textContent='⏸';
    if(state.feedInterval)clearInterval(state.feedInterval);
    setTimeout(()=>addCard(),100);
    setTimeout(()=>addCard(),700);
    setTimeout(()=>addCard(),1300);
    state.feedInterval=setInterval(()=>{
      if(!state.paused)addCard();
    },CONFIG.CARD_INTERVAL);
  }catch(err){
    console.error('Failed to start feed:',err);
  }
}

function refillQueue(){
  if(!state.sourceData||state.sourceData.length===0){
    state.sourceData=[...DATA.DEMO];
  }
  state.queue=shuffle([...state.sourceData]);
}

function addCard(){
  try{
    if(state.queue.length===0)refillQueue();
    if(state.queue.length===0)return;
    const post=state.queue.shift();
    if(!post)return;
    const grid=document.getElementById('cardGrid');
    if(!grid)return;
    if(grid.children.length>=CONFIG.MAX_CARDS){
      const o=grid.children[0];
      if(o){
        o.classList.add('removing');
        setTimeout(function(){if(o&&o.parentNode)o.remove()},600);
      }
    }
    const card=document.createElement('div');
    card.className='post-card entering';
    const postBody=post.body||'';
    const bodyText=postBody.length>0?postBody:'This is a post from Viva Engage';
    const authorName=post.author||'Anonymous';
    const authorTitle=post.title||'Team Member';
    const reactions=post.reactions||0;
    const comments=post.comments||0;
    const timeStamp=post.time||new Date().toISOString();
    const initls=initials(authorName);
    const grad=avatarGrad(authorName);
    card.innerHTML=`
      <div class="card-header">
        <div class="avatar">
          <div style="background:${grad};width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:900;font-size:22px">
            ${initls}
          </div>
        </div>
        <div class="author-info">
          <div class="author-name">${esc(authorName)}</div>
          <div class="author-title">${esc(authorTitle)}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-body-text">${esc(bodyText)}</div>
      </div>
      <div class="card-meta">
        <span>❤️ ${reactions}</span>
        <span>💬 ${comments}</span>
        <span>⏰ ${timeAgo(timeStamp)}</span>
      </div>
    `;
    grid.appendChild(card);
    setTimeout(()=>card.classList.remove('entering'),800);
    card.scrollIntoView({behavior:'smooth',block:'end'});
    state.totalPosts++;
    state.totalReactions+=reactions;
    state.totalComments+=comments;
    updateStats();
  }catch(err){
    console.error('Error adding card:',err);
  }
}

function updateStats(){
  document.getElementById('statPosts').textContent=state.totalPosts;
  document.getElementById('statReactions').textContent=state.totalReactions;
  document.getElementById('statComments').textContent=state.totalComments;
}

function togglePause(){
  state.paused=!state.paused;
  document.getElementById('liveDot').classList.toggle('paused',state.paused);
  document.getElementById('btnPause').textContent=state.paused?'▶':'⏸';
  document.getElementById('statusText').textContent=state.paused?'Paused':'Live — streaming posts';
}

function clearCards(){
  const g=document.getElementById('cardGrid');
  [...g.children].forEach((c,i)=>{setTimeout(()=>{c.classList.add('removing');setTimeout(()=>c.remove(),600)},i*80)});
  state.totalPosts=0;state.totalReactions=0;state.totalComments=0;updateStats();
}

function restartFeed(){
  if(state.feedInterval)clearInterval(state.feedInterval);
  document.getElementById('app').classList.remove('active');
  document.getElementById('setup').classList.remove('hidden');
  document.getElementById('communityPicker').classList.remove('show');
  document.getElementById('campaignInput').classList.remove('show');
  document.getElementById('cardGrid').innerHTML='';
  state.queue=[];
  state.totalPosts=0;state.totalReactions=0;state.totalComments=0;
  updateStats();
}

function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  switch(e.code){
    case'Space':e.preventDefault();if(document.getElementById('app').classList.contains('active'))togglePause();break;
    case'KeyC':if(document.getElementById('app').classList.contains('active'))clearCards();break;
    case'KeyR':if(document.getElementById('app').classList.contains('active'))restartFeed();break;
    case'KeyF':toggleFullscreen();break;
  }
});

window.addEventListener('error',function(e){
  console.error('Error:',e.message);
});
</script>
</body>
</html>
